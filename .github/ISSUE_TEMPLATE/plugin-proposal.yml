name: Plugin proposal
description: Propose a new data-source plugin for nestor
labels: [plugin]
body:
  - type: input
    id: name
    attributes:
      label: Plugin name
      description: Short identifier for the plugin (e.g. "stripe", "intercom")
    validations:
      required: true

  - type: textarea
    id: capabilities
    attributes:
      label: Capabilities
      description: What data does this plugin expose? What can users do with it?
    validations:
      required: true

  - type: textarea
    id: target-api
    attributes:
      label: Target API
      description: Link to the API docs and describe auth method (API key, OAuth, etc.)
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk level
      description: How sensitive is the data this plugin accesses?
      options:
        - Low — public data only
        - Medium — requires user credentials, no financial data
        - High — financial, PII, or write access
    validations:
      required: true
