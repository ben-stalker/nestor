name: Bug report
description: Report a bug or unexpected behaviour
labels: [bug]
body:
  - type: input
    id: title
    attributes:
      label: Summary
      description: A short description of the bug
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, nestor version
      placeholder: "OS: macOS 14\nNode: 20.11.0\nBrowser: Chrome 124\nNestor: 0.1.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reliably reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages or screenshots.
    validations:
      required: true
