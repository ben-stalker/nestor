name: Feature request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe how you'd like the feature to work
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of the app does this affect?
      options:
        - Search
        - Comparison
        - Plugin system
        - UI / UX
        - Performance
        - Developer experience
        - Other
    validations:
      required: true
