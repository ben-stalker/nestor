name: Network Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  audit:
    name: network-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run network audit
        run: npx tsx scripts/audit-network.ts
