notes: >
  PRD provided by user (nestor-prd.md). Architecture document generated 2026-05-08.
  Sprint plan generated 2026-05-08 — 178 stories across 20 epics, 14 sprints,
  112 stories in MVP (Sprints 1–10, ~20 weeks single-developer).
  STORY-1.1 complete (2026-05-09): monorepo scaffold, npm workspaces, TypeScript 6,
  ESLint 8/Airbnb, Prettier 3, Husky 9, lint-staged 17. All 4 scripts passing.
  Architecture doc updated to latest library versions (React 19, Express 5, Node 22 LTS, etc).
  STORY-1.2 complete (2026-05-09): GitHub Actions CI, Dependabot, issue/PR templates.
  STORY-1.3 complete (2026-05-09): better-sqlite3 singleton connection, WAL mode pragmas,
  numbered SQL migration runner, applied_migrations tracking table, db:reset script,
  8 unit tests passing (connection + migrationRunner suites). ESLint updated with
  tsconfigRootDir + server/tsconfig.test.json for test file coverage.
  STORY-1.4 complete (2026-05-09): Express server bootstrap with pino structured logging.
  createApp() factory, requestId middleware, errorHandler middleware, pino-http logger,
  GET /health with DB ping, graceful SIGTERM/SIGINT shutdown (10s timeout), uncaught
  exception handlers. 12 tests passing (3 suites). Fixed pre-existing prettier issues.
  STORY-1.5 complete (2026-05-09): BaseRepository abstract class (protected get/all/run
  helpers), AppSettingsRepository with in-memory cache (null-out invalidation on write),
  migration 001_app_settings.sql, settings-keys.ts with Zod schemas for 19 known keys
  plus validateSetting helper. 19 new tests (31 total passing).
  STORY-1.6 complete (2026-05-09): Vite 8 + React 19 + Tailwind v4 frontend bootstrap.
  @tailwindcss/vite plugin, react-router-dom v7, BrowserRouter + Routes placeholder,
  Nestor splash screen, Express static serving for production, tsx watch dev script,
  concurrently root dev script, 2 RTL tests (33 total passing).
  STORY-1.7 complete (2026-05-09): TanStack Query + Zustand + global ErrorBoundary.
  QueryClientProvider (30s stale, retry 1, no refetchOnWindowFocus), ReactQueryDevtools
  (dev-only), useAppStore Zustand slice (activeProfileId, adminPin, alertCount,
  voiceStatus), apiFetch wrapper (X-Profile-Id/X-Admin-Pin headers), ErrorBoundary
  with recovery card + POST /api/v1/client-errors logging. 46 total tests passing.
  STORY-1.8 complete (2026-05-09): AES-256-GCM encryption helper for credentials at rest.
  CryptoService class + module-level encrypt/decrypt exports. HKDF-SHA256 key derivation
  from machine-id + auto-generated 32-byte salt stored in app_settings.encryption_salt.
  getMachineId() with /etc/machine-id → ~/.nestor/machine-id (UUID, mode 0600) fallback.
  Output format v1:<iv_b64>:<tag_b64>:<ct_b64>; GCM auth tag tamper detection.
  17 new tests (48 server total, 63 overall). lint + typecheck clean.
  STORY-1.9 complete (2026-05-10): Typed in-process event bus singleton. TypedEventBus
  wraps Node EventEmitter with generic emit/on/off/once over EventMap. Custom dispatch
  loop (forEach + try/catch) isolates listeners — a throwing handler logs via pino and
  remaining listeners still run. setMaxListeners(50). EventMap declared in eventBus.types.ts
  with placeholder Alert type; 8 events covered. AppSettingsRepository updated to emit
  settings:updated on set/delete. 11 new tests (59 server total). lint + typecheck clean.
  STORY-1.10 complete (2026-05-10): WebSocket server scaffold. NestorWsServer class mounts
  ws v8 on the Express HTTP server at /ws. broadcast(msg) + send(clientId, msg) exposed.
  Subscribes to alert:new, alert:dismissed, voice:status, calendar:synced from event bus.
  30s heartbeat ping with dead-client pruning. Configurable heartbeat interval for tests.
  Client-side useWebSocket() hook with exponential back-off (500ms base, 30s cap, 2x factor).
  11 new server tests (70 total), 8 new client tests (24 total). lint + typecheck clean.
  ESLint updated: no-void allowAsStatement: true (resolves no-floating-promises conflict).
  STORY-1.11 complete (2026-05-10): Job scheduler base. Scheduler class wraps node-cron v4.
  register(name, cron, handler) — validates expression, wraps in try/catch, tracks runCount/
  lastRun/lastError. runNow(name) for immediate execution. list() returns JobInfo[].
  stop() halts all jobs on shutdown. Five built-in placeholder jobs: weather-refresh (*/30),
  caldav-sync (*/15), reminder-eval (5 0 *), github-update-poll (0 3 *), vacuum-db (0 3 * * 0).
  node-cron installed (v4.2.1). 23 new tests (93 server total). lint + typecheck clean.
  Next: STORY-2.1.
